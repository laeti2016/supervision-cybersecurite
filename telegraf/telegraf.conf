[agent]
  interval = "10s"
  flush_interval = "10s"
  omit_hostname = true

[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = ["sensors/+/telemetry"]
  qos = 0
  data_format = "json"
  name_override = "sensor"
  tag_keys = ["device_id", "location"]
  json_string_fields = []

[[outputs.prometheus_client]]
  listen = ":9273"
  metric_version = 2
